name: CI

# Runs on every push to main and every PR targeting main.
# Branch protection on main requires this workflow to pass before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      # The real values live in the deploy env (Vercel / wherever).
      # CI only needs non-empty strings here to satisfy the startup
      # guard in src/lib/supabase.ts — the build produces no network
      # calls, so dummies are fine.
      NEXT_PUBLIC_SUPABASE_URL: https://ci.example.invalid
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck + production build
        run: bun run build
